services:
  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "3002:3000"
    environment:
      - MONGO_URI=mongodb://mongodb:27017/mydb
    depends_on:
      mongodb:
        condition: service_healthy

volumes:
  mongo_data:
