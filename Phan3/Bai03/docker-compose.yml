services:
  flask1:
    build: ./flask_app
    networks:
      - lb_net
    environment:
      - INSTANCE_ID=1

  flask2:
    build: ./flask_app
    networks:
      - lb_net
    environment:
      - INSTANCE_ID=2

  nginx:
    image: nginx:latest
    ports:
      - "8086:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - lb_net
    depends_on:
      - flask1
      - flask2

networks:
  lb_net:
